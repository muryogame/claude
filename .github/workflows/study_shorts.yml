name: StudyFlow Shorts 自動投稿

on:
  schedule:
    # JST = UTC+9 → UTC = JST - 9
    - cron: '0 22 * * *'   #  7:00 JST (前日 22:00 UTC)
    - cron: '0  1 * * *'   # 10:00 JST
    - cron: '0  4 * * *'   # 13:00 JST
    - cron: '0  8 * * *'   # 17:00 JST
    - cron: '0 12 * * *'   # 21:00 JST
  workflow_dispatch:
    inputs:
      slot:
        description: 'スロット番号 (1-5)'
        required: false
        default: '1'

jobs:
  post-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 日本語フォントと ffmpeg をインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk ffmpeg
          mkdir -p /home/runner/.local/share/fonts
          cp /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc \
             /home/runner/.local/share/fonts/NotoSansCJKjp-Bold.otf 2>/dev/null || true
          cp /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc \
             /home/runner/.local/share/fonts/NotoSansCJKjp-Regular.otf 2>/dev/null || true
          fc-cache -f

      - name: 依存パッケージをインストール
        run: pip install -r study_shorts/requirements.txt

      - name: 認証情報を配置
        working-directory: study_shorts
        env:
          STUDY_YOUTUBE_TOKEN_JSON: ${{ secrets.STUDY_YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: |
          echo "$STUDY_YOUTUBE_TOKEN_JSON" > token.json
          echo "$YOUTUBE_CLIENT_SECRET_JSON" > client_secret.json

      - name: スロット番号を決定
        id: slot
        run: |
          HOUR=$(date -u +%H)
          case "$HOUR" in
            22) SLOT=1 ;;
             1) SLOT=2 ;;
             4) SLOT=3 ;;
             8) SLOT=4 ;;
            12) SLOT=5 ;;
             *) SLOT=${{ github.event.inputs.slot || '1' }} ;;
          esac
          echo "slot=$SLOT" >> $GITHUB_OUTPUT

      - name: Shorts 動画を生成・投稿
        working-directory: study_shorts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          STUDY_YOUTUBE_CHANNEL_ID: UCXlATa9z8MkQUe3N0deRbhA
          YOUTUBE_TOKEN_JSON: ${{ secrets.STUDY_YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: python3 main.py --once --slot ${{ steps.slot.outputs.slot }}

      - name: 更新されたトークンを Secret に書き戻す
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f study_shorts/token.json ]; then
            gh secret set STUDY_YOUTUBE_TOKEN_JSON \
              --body "$(cat study_shorts/token.json)" \
              --repo ${{ github.repository }}
          fi
