<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アイテム一覧 | LOL初心者ガイド</title>
  <meta name="description" content="League of Legendsの主要アイテム一覧。カテゴリー別に絞り込み・検索できます。">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#C89B3C;--gold-light:#F0E6D3;--blue-dark:#0A1428;--blue-mid:#0D1B2E;
      --blue-card:#091428;--teal:#0BC4E3;
      --text:#A0A9B4;--text-light:#C8D0DC;--white:#fff;
    }
    body{font-family:'Segoe UI','Hiragino Kaku Gothic ProN',sans-serif;background:var(--blue-dark);color:var(--text-light);min-height:100vh}

    nav{background:rgba(10,20,40,0.97);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
    .nav-inner{max-width:1300px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px;height:60px}
    .nav-logo{font-size:1.3rem;font-weight:900;color:var(--gold);text-decoration:none;white-space:nowrap}
    .nav-links{display:flex;gap:4px;flex:1}
    .nav-links a{color:var(--text);text-decoration:none;font-size:0.85rem;padding:6px 12px;border-radius:4px;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold)}

    .hero{background:linear-gradient(160deg,#0D1B2E,#0A1428 60%,#091020);padding:40px 20px 32px;text-align:center;border-bottom:1px solid rgba(200,155,60,.2)}
    .hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;color:var(--gold);margin-bottom:8px}
    .hero p{color:var(--text);font-size:0.95rem;max-width:560px;margin:0 auto}

    .controls{max-width:1300px;margin:0 auto;padding:24px 20px 0}
    .search-bar{position:relative;margin-bottom:16px}
    .search-bar input{width:100%;padding:12px 48px 12px 20px;border-radius:8px;border:2px solid rgba(200,155,60,.3);background:var(--blue-card);color:var(--white);font-size:1rem;outline:none;transition:border-color .2s}
    .search-bar input:focus{border-color:var(--gold)}
    .search-bar input::placeholder{color:var(--text)}
    .search-bar .s-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--gold)}

    .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .cat-btn{padding:7px 16px;border-radius:20px;border:2px solid transparent;background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-size:0.82rem;font-weight:600;transition:all .2s}
    .cat-btn:hover,.cat-btn.active{color:#fff;border-color:var(--gold);background:rgba(200,155,60,.15)}

    .result-count{color:var(--text);font-size:0.85rem;margin-bottom:16px}

    .grid{max-width:1300px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}

    .item-card{background:var(--blue-card);border-radius:10px;overflow:hidden;border:1px solid rgba(200,155,60,.15);transition:transform .2s,box-shadow .2s,border-color .2s;cursor:default}
    .item-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(200,155,60,.2);border-color:rgba(200,155,60,.4)}
    .item-card.hidden{display:none}

    .item-top{display:flex;align-items:center;gap:12px;padding:14px 14px 10px}
    .item-icon-wrap{width:52px;height:52px;border-radius:8px;border:2px solid rgba(200,155,60,.3);overflow:hidden;flex-shrink:0;background:#0A1428;display:flex;align-items:center;justify-content:center}
    .item-icon{width:100%;height:100%;object-fit:cover;display:block}
    .item-icon-fallback{font-size:1.6rem;display:none}
    .item-head{flex:1;min-width:0}
    .item-jp{font-size:0.82rem;font-weight:700;color:var(--white);line-height:1.3;margin-bottom:2px}
    .item-en{font-size:0.68rem;color:var(--text)}
    .item-cat{display:inline-block;font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:4px}
    .cat-スターター{background:rgba(89,200,89,.2);color:#59C859}
    .cat-ブーツ{background:rgba(89,160,227,.2);color:#59A0E3}
    .cat-ファイター{background:rgba(227,89,89,.2);color:#E35959}
    .cat-タンク{background:rgba(89,160,89,.2);color:#7DC87D}
    .cat-マジシャン{background:rgba(160,89,227,.2);color:#A059E3}
    .cat-ADC{background:rgba(227,200,89,.2);color:#E3C859}
    .cat-アサシン{background:rgba(160,120,40,.2);color:#C89B3C}
    .cat-サポート{background:rgba(89,200,200,.2);color:#59C8C8}

    .item-body{padding:0 14px 14px}
    .item-stats{font-size:0.75rem;color:var(--teal);font-weight:600;margin-bottom:4px}
    .item-passive{font-size:0.72rem;color:var(--text);line-height:1.5}
    .item-price{font-size:0.7rem;color:var(--gold);margin-top:6px}

    .empty{text-align:center;padding:80px 20px;color:var(--text);grid-column:1/-1}
    .empty .e-icon{font-size:4rem;margin-bottom:16px}

    footer{background:#060e1a;border-top:1px solid rgba(200,155,60,.2);padding:24px 20px;text-align:center;color:var(--text);font-size:0.8rem}
    footer a{color:var(--gold);text-decoration:none}

    @media(max-width:600px){
      .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
      .nav-links{display:none}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">⚔ LOL初心者ガイド</a>
    <div class="nav-links">
      <a href="index.html">始め方</a>
      <a href="index.html#lane">レーン</a>
      <a href="champions.html">チャンピオン一覧</a>
      <a href="items.html" class="active">アイテム一覧</a>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>アイテム一覧</h1>
  <p>カテゴリーや名前でアイテムを検索できます。各チャンピオンのおすすめビルドはチャンピオン詳細ページで確認できます。</p>
</section>

<div class="controls">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="アイテム名を検索（日本語・英語）..." oninput="applyFilters()">
    <span class="s-icon">🔍</span>
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div class="result-count" id="resultCount"></div>
</div>

<div class="grid" id="itemGrid"></div>

<footer>
  <p>
    <a href="champions.html">← チャンピオン一覧</a> ｜
    <a href="index.html">始め方ガイド</a> ｜
    アイテムデータはLoL公式情報をもとに作成
  </p>
</footer>

<script src="js/items-data.js"></script>
<script>
const CATEGORIES = ["すべて","スターター","ブーツ","ファイター","タンク","マジシャン","ADC","アサシン","サポート"];
const DDV = "14.10.1";
let currentCat = "すべて";

function buildFilters(){
  const row = document.getElementById('filterRow');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat==="すべて"?' active':'');
    btn.textContent = cat;
    btn.onclick = () => {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    };
    row.appendChild(btn);
  });
}

function applyFilters(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.item-card');
  let visible = 0;
  cards.forEach(card => {
    const matchCat = currentCat === 'すべて' || card.dataset.cat === currentCat;
    const matchQ = !q || card.dataset.name.includes(q);
    if(matchCat && matchQ){ card.classList.remove('hidden'); visible++; }
    else { card.classList.add('hidden'); }
  });
  document.getElementById('resultCount').textContent = `${visible}件表示中`;
  const emp = document.getElementById('emptyState');
  if(emp) emp.style.display = visible===0?'block':'none';
}

function buildGrid(){
  const grid = document.getElementById('itemGrid');
  ITEMS.forEach(item => {
    const iconUrl = `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/item/${item.id}.png`;
    const searchName = `${item.jp} ${item.en}`.toLowerCase();
    const div = document.createElement('div');
    div.className = 'item-card';
    div.dataset.cat = item.cat;
    div.dataset.name = searchName;
    div.innerHTML = `
      <div class="item-top">
        <div class="item-icon-wrap">
          <img class="item-icon" src="${iconUrl}" alt="${item.jp}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="item-icon-fallback" style="display:none">⚔</div>
        </div>
        <div class="item-head">
          <div class="item-jp">${item.jp}</div>
          <div class="item-en">${item.en}</div>
          <span class="item-cat cat-${item.cat}">${item.cat}</span>
        </div>
      </div>
      <div class="item-body">
        <div class="item-stats">${item.stats}</div>
        ${item.passive?`<div class="item-passive">${item.passive}</div>`:''}
        ${item.price?`<div class="item-price">💰 ${item.price.toLocaleString()}G</div>`:''}
      </div>`;
    grid.appendChild(div);
  });

  const empty = document.createElement('div');
  empty.id = 'emptyState';
  empty.className = 'empty';
  empty.style.display = 'none';
  empty.innerHTML = '<div class="e-icon">🔍</div><p>該当するアイテムが見つかりません</p>';
  grid.appendChild(empty);

  applyFilters();
}

buildFilters();
buildGrid();
</script>
</body>
</html>
