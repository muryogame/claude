<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャンピオン一覧 | LOL初心者ガイド</title>
  <meta name="description" content="League of Legends全144チャンピオンを役割・難易度で検索・絞り込み。スプラッシュアートで見やすい一覧。">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#C89B3C;--gold-light:#F0E6D3;--blue-dark:#0A1428;--blue-mid:#0D1B2E;
      --blue-card:#091428;--teal:#0BC4E3;--teal-dark:#0598B7;
      --text:#A0A9B4;--text-light:#C8D0DC;--white:#fff;
    }
    body{font-family:'Segoe UI','Hiragino Kaku Gothic ProN',sans-serif;background:var(--blue-dark);color:var(--text-light);min-height:100vh}

    /* NAV */
    nav{background:rgba(10,20,40,0.97);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
    .nav-inner{max-width:1300px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px;height:60px}
    .nav-logo{font-size:1.3rem;font-weight:900;color:var(--gold);text-decoration:none;white-space:nowrap}
    .nav-links{display:flex;gap:4px;flex:1}
    .nav-links a{color:var(--text);text-decoration:none;font-size:0.85rem;padding:6px 12px;border-radius:4px;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold)}

    /* HERO */
    .hero{background:linear-gradient(160deg,#0D1B2E 0%,#0A1428 60%,#091020 100%);padding:40px 20px 32px;text-align:center;border-bottom:1px solid rgba(200,155,60,.2)}
    .hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;color:var(--gold);margin-bottom:8px}
    .hero p{color:var(--text);font-size:0.95rem;max-width:560px;margin:0 auto 24px}

    /* SEARCH + FILTERS */
    .controls{max-width:1300px;margin:0 auto;padding:24px 20px 0}
    .search-bar{position:relative;margin-bottom:16px}
    .search-bar input{
      width:100%;padding:12px 48px 12px 20px;border-radius:8px;
      border:2px solid rgba(200,155,60,.3);background:var(--blue-card);
      color:var(--white);font-size:1rem;outline:none;transition:border-color .2s
    }
    .search-bar input:focus{border-color:var(--gold)}
    .search-bar input::placeholder{color:var(--text)}
    .search-bar .s-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--gold)}

    .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .role-btn{
      padding:8px 18px;border-radius:20px;border:2px solid transparent;
      background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;
      font-size:0.85rem;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:6px
    }
    .role-btn:hover,.role-btn.active{color:#fff;border-color:var(--gold);background:rgba(200,155,60,.15)}
    .role-btn[data-role="TOP"].active{background:rgba(227,89,89,.2);border-color:#E35959;color:#E35959}
    .role-btn[data-role="JG"].active{background:rgba(89,200,89,.2);border-color:#59C859;color:#59C859}
    .role-btn[data-role="MID"].active{background:rgba(200,155,60,.2);border-color:var(--gold);color:var(--gold)}
    .role-btn[data-role="ADC"].active{background:rgba(89,160,227,.2);border-color:#59A0E3;color:#59A0E3}
    .role-btn[data-role="SUPPORT"].active{background:rgba(160,89,227,.2);border-color:#A059E3;color:#A059E3}

    .result-count{color:var(--text);font-size:0.85rem;margin-bottom:16px}

    /* GRID */
    .grid{
      max-width:1300px;margin:0 auto;padding:0 20px 60px;
      display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px
    }
    .champ-card{
      background:var(--blue-card);border-radius:10px;overflow:hidden;
      border:1px solid rgba(200,155,60,.15);cursor:pointer;text-decoration:none;
      color:inherit;transition:transform .2s,box-shadow .2s,border-color .2s;display:block
    }
    .champ-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(200,155,60,.2);border-color:var(--gold)}
    .champ-card.hidden{display:none}

    .champ-img{width:100%;aspect-ratio:1;object-fit:cover;object-position:top center;background:#0A1428;display:block}
    .champ-img-fallback{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:linear-gradient(135deg,#0D1B2E,#0A1428)}

    .champ-body{padding:10px 12px 12px}
    .champ-jp{font-size:0.78rem;font-weight:700;color:var(--white);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .champ-en{font-size:0.68rem;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .champ-role{font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px}
    .role-TOP{background:rgba(227,89,89,.2);color:#E35959}
    .role-JG{background:rgba(89,200,89,.2);color:#59C859}
    .role-MID{background:rgba(200,155,60,.2);color:var(--gold)}
    .role-ADC{background:rgba(89,160,227,.2);color:#59A0E3}
    .role-SUPPORT{background:rgba(160,89,227,.2);color:#A059E3}
    .champ-diff{font-size:0.7rem;color:var(--gold);letter-spacing:1px}

    /* Empty state */
    .empty{text-align:center;padding:80px 20px;color:var(--text);grid-column:1/-1}
    .empty .e-icon{font-size:4rem;margin-bottom:16px}
    .empty p{font-size:1rem}

    /* Footer */
    footer{background:#060e1a;border-top:1px solid rgba(200,155,60,.2);padding:24px 20px;text-align:center;color:var(--text);font-size:0.8rem}
    footer a{color:var(--gold);text-decoration:none}

    @media(max-width:600px){
      .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
      .nav-links{display:none}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">⚔ LOL初心者ガイド</a>
    <div class="nav-links">
      <a href="index.html">始め方</a>
      <a href="index.html#lane">レーン</a>
      <a href="champions.html" class="active">チャンピオン一覧</a>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>チャンピオン一覧</h1>
  <p>全144チャンピオンをロール・難易度で絞り込めます。名前で検索も可能。</p>
</section>

<div class="controls">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="チャンピオン名を検索（日本語・英語）..." oninput="applyFilters()">
    <span class="s-icon">🔍</span>
  </div>
  <div class="filter-row">
    <button class="role-btn active" data-role="ALL" onclick="setRole('ALL',this)">⚔ すべて</button>
    <button class="role-btn" data-role="TOP" onclick="setRole('TOP',this)">🛡 TOP</button>
    <button class="role-btn" data-role="JG" onclick="setRole('JG',this)">🌿 JUNGLE</button>
    <button class="role-btn" data-role="MID" onclick="setRole('MID',this)">⚡ MID</button>
    <button class="role-btn" data-role="ADC" onclick="setRole('ADC',this)">🏹 ADC</button>
    <button class="role-btn" data-role="SUPPORT" onclick="setRole('SUPPORT',this)">💜 SUPPORT</button>
  </div>
  <div class="result-count" id="resultCount"></div>
</div>

<div class="grid" id="champGrid"></div>

<footer>
  <p><a href="index.html">← LOL始め方ガイドへ戻る</a> ｜ チャンピオンデータはゲーム内情報をもとに作成</p>
</footer>

<script src="js/champions-data.js"></script>
<script>
  let currentRole = 'ALL';

  function diffStars(n) {
    return '★'.repeat(n) + '☆'.repeat(5 - n);
  }

  function setRole(role, btn) {
    currentRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const cards = document.querySelectorAll('.champ-card');
    let visible = 0;
    cards.forEach(card => {
      const role = card.dataset.role;
      const name = card.dataset.name;
      const matchRole = currentRole === 'ALL' || role === currentRole;
      const matchSearch = !q || name.includes(q);
      if (matchRole && matchSearch) {
        card.classList.remove('hidden');
        visible++;
      } else {
        card.classList.add('hidden');
      }
    });
    document.getElementById('resultCount').textContent = `${visible}件表示中`;

    const empty = document.getElementById('emptyState');
    if (empty) empty.style.display = visible === 0 ? 'block' : 'none';
  }

  function buildGrid() {
    const grid = document.getElementById('champGrid');

    CHAMPIONS.forEach(c => {
      const key = c.img || c.en;
      const imgUrl = `https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${key}_0.jpg`;
      const searchName = `${c.jp} ${c.en}`.toLowerCase();

      const a = document.createElement('a');
      a.className = 'champ-card';
      a.href = `champion.html?name=${encodeURIComponent(c.en)}`;
      a.dataset.role = c.role;
      a.dataset.name = searchName;

      const roleLabel = {TOP:'TOP',JG:'JG',MID:'MID',ADC:'ADC',SUPPORT:'SUP'}[c.role] || c.role;

      a.innerHTML = `
        <img class="champ-img" src="${imgUrl}" alt="${c.jp}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          loading="lazy">
        <div class="champ-img-fallback" style="display:none">⚔</div>
        <div class="champ-body">
          <div class="champ-jp">${c.jp}</div>
          <div class="champ-en">${c.en}</div>
          <span class="champ-role role-${c.role}">${roleLabel}</span>
          <div class="champ-diff">${diffStars(c.diff)}</div>
        </div>`;

      grid.appendChild(a);
    });

    // Empty state
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.id = 'emptyState';
    empty.style.display = 'none';
    empty.innerHTML = '<div class="e-icon">🔍</div><p>該当するチャンピオンが見つかりません</p>';
    grid.appendChild(empty);

    applyFilters();
  }

  buildGrid();
</script>
</body>
</html>
